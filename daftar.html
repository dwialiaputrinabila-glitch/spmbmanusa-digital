<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PPDB MA NU Sumber Agung</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-color:#f8f9fa;
        }

        .hero-header{
            background: linear-gradient(135deg, #0f5132, #198754);
            color:white;
            padding:60px 0;
        }

        .section-title{
            font-weight:700;
            color:#0f5132;
        }

        .card-form{
            border:none;
            border-radius:15px;
            overflow:hidden;
        }

        .card-header{
            background:#198754;
            color:white;
            font-weight:600;
        }

        .btn-sekolah{
            background:#198754;
            border-color:#198754;
        }

        .btn-sekolah:hover{
            background:#198754;
            border-color:#198754;
        }

        .required{
            color:red;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <section class="hero-header text-center">
        <div class="container">
            <h1 class="fw-bold">
                SPMB MA NU SUMBER AGUNG
            </h1>
            <p class="mb-0">
                Formulir Pendaftaran Peserta Didik Baru
            </p>
        </div>
    </section>

    <!-- Formulir -->
    <section class="py-5">
        <div class="container">

            <div class="row justify-content-center">
                <div class="col-lg-10">

                    <div class="card card-form shadow-lg">
                        <div class="card-header py-3">
                            Formulir Pendaftaran Siswa Baru
                        </div>

                        <div class="card-body p-4">

                            <form>

                                <h5 class="section-title mb-3">
                                    Data Pribadi
                                </h5>

                                <div class="row g-3">

                                    <div class="col-md-6">
                                        <label class="form-label">
                                            Nama Lengkap <span class="required">*</span>
                                        </label>
                                        <input type="text" class="form-control" required>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label">
                                            NISN <span class="required">*</span>
                                        </label>
                                        <input type="text" class="form-control" required>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label">
                                            Tempat Lahir <span class="required">*</span>
                                        </label>
                                        <input type="text" class="form-control" required>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label">
                                            Tanggal Lahir <span class="required">*</span>
                                        </label>
                                        <input type="date" class="form-control" required>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label">
                                            Jenis Kelamin <span class="required">*</span>
                                        </label>
                                        <select class="form-select" required>
                                            <option value="">Pilih</option>
                                            <option>Laki-Laki</option>
                                            <option>Perempuan</option>
                                        </select>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label">
                                            Agama <span class="required">*</span>
                                        </label>
                                        <input type="text" class="form-control" value="Islam">
                                    </div>

                                    <div class="col-12">
                                        <label class="form-label">
                                            Alamat Lengkap <span class="required">*</span>
                                        </label>
                                        <textarea class="form-control" rows="3" required></textarea>
                                    </div>

                                </div>

                                <hr class="my-4">

                                <h5 class="section-title mb-3">
                                    Data Orang Tua / Wali
                                </h5>

                                <div class="row g-3">

                                    <div class="col-md-6">
                                        <label class="form-label">
                                            Nama Ayah
                                        </label>
                                        <input type="text" class="form-control">
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label">
                                            Nama Ibu
                                        </label>
                                        <input type="text" class="form-control">
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label">
                                            Pekerjaan Ayah
                                        </label>
                                        <input type="text" class="form-control">
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label">
                                            Pekerjaan Ibu
                                        </label>
                                        <input type="text" class="form-control">
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label">
                                            Nomor HP Orang Tua
                                        </label>
                                        <input type="tel" class="form-control">
                                    </div>

                                </div>

                                <hr class="my-4">

                                <h5 class="section-title mb-3">
                                    Data Sekolah Asal
                                </h5>

                                <div class="row g-3">

                                    <div class="col-md-6">
                                        <label class="form-label">
                                            Nama Sekolah Asal
                                        </label>
                                        <input type="text" class="form-control">
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label">
                                            Tahun Lulus
                                        </label>
                                        <input type="number" class="form-control">
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label">
                                            Nomor HP Siswa
                                        </label>
                                        <input type="tel" class="form-control">
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label">
                                            Email
                                        </label>
                                        <input type="email" class="form-control">
                                    </div>

                                </div>

                                <hr class="my-4">

                                <h5 class="section-title mb-3">
                                    Upload Berkas
                                </h5>

                                <div class="row g-3">

                                    <div class="col-md-6">
                                        <label class="form-label">
                                            Pas Foto
                                        </label>
                                        <input type="file" class="form-control">
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label">
                                            Scan Ijazah / SKL
                                        </label>
                                        <input type="file" class="form-control">
                                    </div>

                                </div>

                                <div class="mt-4">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" required>
                                        <label class="form-check-label">
                                            Saya menyatakan data yang diisi adalah benar.
                                        </label>
                                    </div>
                                </div>

                                <div class="mt-4 d-grid">
                                    <button type="submit" class="btn btn-success btn-lg">
                                        Kirim Pendaftaran
                                    </button>
                                </div>

                            </form>

                        </div>
                    </div>

                </div>
            </div>

        </div>
    </section>

    <footer class="bg-success text-white text-center py-3">
        © 2026 SPMB MA NU Sumber Agung |
            Buay Madang, OKU Timur, Sumatera Selatan
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
